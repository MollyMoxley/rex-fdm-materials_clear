[gcode_macro MACHINE_EX0]
description: Profil machine EX0 — Qidi X-Max 3 / MKS SKIPR / CoreXY

# --- IDENTITÉ ---
# variable_machine_id:       "EX0"
# variable_machine_name:     "Qidi X-Max 3"
# variable_kinematics:       "corexy"
# variable_board:            "MKS SKIPR (STM32F407) + MKS_THR (RP2040)"
# variable_firmware:         "Klipper V4.3.15"

# --- VOLUME UTILE (mm) ---
# Note : plateau physique 325x325, Bambu Studio limité à 310x310 (évite Y out-of-range)
variable_bed_x_max:          315    # position_max stepper_x
variable_bed_y_max:          315    # position_max stepper_y
variable_bed_z_max:          315    # position_max stepper_z
variable_bed_x_bambu:        310    # limite slicer recommandée
variable_bed_y_bambu:        310

# --- HOTEND ---
variable_nozzle_diameter:    0.400
variable_filament_diameter:  1.75
variable_max_temp_hotend:    360    # buse acier trempé MAX6675
variable_min_extrude_temp:   170    # sécurité anti-extrusion à froid
variable_sensor_type:        "MAX6675"

# --- VITESSES MACHINE (mm/s) ---
variable_max_velocity:       600
variable_max_z_velocity:      20
variable_max_travel_speed:   600

# --- ACCÉLÉRATIONS (mm/s²) ---
variable_max_accel:         20000   # validé post-IS (ADXL345 calibré)
variable_max_z_accel:         800   # [GAIN-1] vis T8 + TMC 0.95A validé
variable_square_corner_vel:    12   # [GAIN-4] validé post-IS

# --- EXTRUDEUR ---
variable_gear_ratio:         "1628:170"   # ~9.58:1
variable_pressure_advance:   0.032        # mesuré hotend 200-600mm/s
variable_pa_smooth_time:     0.03

# --- BED MESH ---
variable_mesh_min_x:          58.0   # SAVE_CONFIG 11/03/2026
variable_mesh_min_y:          35.0
variable_mesh_max_x:         285.0
variable_mesh_max_y:         300.0
variable_mesh_points:            9   # 9x9 = 81 points

# --- Z OFFSET ---
variable_z_offset:           1.124   # calibré 11/03/2026

# --- PROBE (BLTouch / inductive) ---
variable_probe_x_center:    129.5   # position centre plateau pour M4029
variable_probe_y_center:    153.1

# --- CHAMBRE ---
variable_has_chamber:            1   # chambre chauffée présente
variable_chamber_max_temp:      60   # ABS nominal

# --- CAPTEUR FILAMENT ---
variable_has_filament_sensor:    1
variable_filament_sensor_name:   "fila"

# --- LIMITES PROCESS PAR MATIÈRE (garde-fous machine) ---
# Ces valeurs sont les limites HARDWARE — indépendantes du profil matière
variable_temp_nozzle_abs_max:  360   # max_temp firmware
variable_temp_bed_abs_max:     120   # sécurité plateau
variable_speed_print_abs_max:  300   # conservatif — au-delà IS requis

gcode:
  RESPOND MSG="MACHINE_EX0 chargé — Qidi X-Max 3 / volume {printer['gcode_macro MACHINE_EX0'].bed_x_max}x{printer['gcode_macro MACHINE_EX0'].bed_y_max}x{printer['gcode_macro MACHINE_EX0'].bed_z_max}mm"
