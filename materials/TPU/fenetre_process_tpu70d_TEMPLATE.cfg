# ==============================================================
# FENETRE PROCESS — TPU 70D Recreus [TEMPLATE — A QUALIFIER]
# repo   : rex-fdm-materials_clear
# path   : materials/TPU/fenetre_process_tpu70d.cfg
# version: 0.1.0-draft
# statut : A QUALIFIER — DOE Taguchi L8 prévu phase P3
# ==============================================================

[gcode_macro MAT_TPU70D]
description: TPU 70D Recreus — TEMPLATE — DOE L8 requis

# ⚠️ VALEURS NON VALIDÉES — DOE Taguchi L8 à conduire
# Paramètres L8 : temp / speed / flow / retract / fan / layer_height / accel / wipe

variable_temp_nozzle_nom:      225     # [A QUALIFIER] Recreus recommande 220-235
variable_temp_nozzle_min:      215
variable_temp_nozzle_max:      240
variable_temp_bed_nom:          40
variable_temp_bed_min:          30
variable_temp_bed_max:          50

variable_speed_outer_wall_nom:  25     # [A QUALIFIER] 70D très souple = lent
variable_speed_outer_wall_min:  10
variable_speed_outer_wall_max:  35
variable_speed_infill_nom:      40
variable_speed_travel_nom:      80

variable_flow_ratio_nom:      1.00     # [A QUALIFIER]
variable_flow_ratio_min:      0.92
variable_flow_ratio_max:      1.08
variable_vol_flow_max:        1.00     # [A QUALIFIER] estimation conservative

variable_retract_length_nom:   0.0     # [A QUALIFIER] Recreus déconseille rétraction
variable_retract_speed_nom:    20

variable_fan_min:                0     # [A QUALIFIER] 70D = zéro fan conseillé
variable_fan_max:               10
variable_fan_first_layers:       0

variable_avoid_crossing:         1
variable_avoid_crossing_dist:   12
variable_wipe_dist:           1.00

gcode:
  RESPOND MSG="⚠️ MAT_TPU70D TEMPLATE — DOE L8 requis avant usage production"
