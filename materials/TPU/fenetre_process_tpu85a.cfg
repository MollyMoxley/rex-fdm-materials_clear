# ==============================================================
# FENETRE PROCESS — TPU 85A
# repo   : rex-fdm-materials_clear
# path   : materials/TPU/fenetre_process_tpu85a.cfg
# version: 1.0.0
# source : REX validé — DOE IT-8 clôturé
# ==============================================================

[gcode_macro MAT_TPU85A]
description: Profil matière TPU 85A — fenêtres process validées REX

# --- TEMPÉRATURES ---
variable_temp_nozzle_nom:      229
variable_temp_nozzle_min:      215
variable_temp_nozzle_max:      240
variable_temp_bed_nom:          45
variable_temp_bed_min:          35
variable_temp_bed_max:          55

# --- VITESSES (mm/s) ---
variable_speed_outer_wall_nom:  35
variable_speed_outer_wall_min:  15
variable_speed_outer_wall_max:  50
variable_speed_inner_wall_nom:  50
variable_speed_infill_nom:      60
variable_speed_travel_nom:     150

# --- FLOW ---
variable_flow_ratio_nom:      1.02
variable_flow_ratio_min:      0.95
variable_flow_ratio_max:      1.10
variable_vol_flow_max:        1.42   # mm³/s — validé DOE IT-8

# --- RÉTRACTION ---
variable_retract_length_nom:   0.8   # direct drive
variable_retract_speed_nom:    25

# --- VENTILATION ---
variable_fan_min:               10   # % — TPU = refroidissement minimal
variable_fan_max:               18
variable_fan_first_layers:       0   # désactivé couches 1-3

# --- COMPORTEMENT ---
variable_avoid_crossing:         1
variable_avoid_crossing_dist:    8   # mm
variable_wipe_dist:           0.75

gcode:
  RESPOND MSG="MAT_TPU85A chargé — temp_nom={printer['gcode_macro MAT_TPU85A'].temp_nozzle_nom}C flow={printer['gcode_macro MAT_TPU85A'].flow_ratio_nom}"
