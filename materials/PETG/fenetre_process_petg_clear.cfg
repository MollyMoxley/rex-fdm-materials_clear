[gcode_macro MAT_PETG_CLEAR]
description: Profil matière PETG Clear Overture — ESTIMATIONS à qualifier

# --- TEMPÉRATURES ---
variable_temp_nozzle_nom:      235     # [A QUALIFIER] estimation standard Overture
variable_temp_nozzle_min:      225     # [A QUALIFIER]
variable_temp_nozzle_max:      245     # [A QUALIFIER]
variable_temp_bed_nom:          70     # [A QUALIFIER] estimation standard PETG
variable_temp_bed_min:          60
variable_temp_bed_max:          80

# --- VITESSES (mm/s) ---
variable_speed_outer_wall_nom:  40     # [A QUALIFIER] estimation raisonnable
variable_speed_outer_wall_min:  20
variable_speed_outer_wall_max:  60
variable_speed_inner_wall_nom:  80     # [A QUALIFIER]
variable_speed_infill_nom:     100     # [A QUALIFIER]
variable_speed_travel_nom:     200

# --- FLOW ---
variable_flow_ratio_nom:      1.00     # [A QUALIFIER] non mesuré sur cette bobine
variable_flow_ratio_min:      0.92
variable_flow_ratio_max:      1.08
variable_vol_flow_max:        11.0     # [A QUALIFIER] limite hotend théorique 0.4mm

# --- RÉTRACTION ---
variable_retract_length_nom:   0.8     # [A QUALIFIER] direct drive estimation
variable_retract_speed_nom:    35

# --- VENTILATION ---
variable_fan_min:               30     # [A QUALIFIER] PETG = refroidissement modéré
variable_fan_max:               60     # [A QUALIFIER]
variable_fan_first_layers:       0     # désactivé couches 1-3

# --- COMPORTEMENT ---
variable_avoid_crossing:         1
variable_wipe_dist:           0.75

# --- QUALIFICATION REQUISE ---
# Tour de température : 225-245°C pas 5°C
# Cube flow : mesurer paroi unique, ajuster flow_ratio
# Tour stringing : valider retraction + wipe
# Mettre à jour version → 2.0.0 après REX validé

gcode:
  RESPOND MSG="⚠️ MAT_PETG_CLEAR — estimations non validées par REX"
