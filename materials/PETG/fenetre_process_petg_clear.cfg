[gcode_macro MAT_PETG_CLEAR]
description: Profil matière PETG Clear Overture — fenêtres process validées

# --- TEMPÉRATURES ---
variable_temp_nozzle_nom:      235     # nominal validé DOE
variable_temp_nozzle_min:      225     # limite basse absolue
variable_temp_nozzle_max:      245     # limite haute absolue
variable_temp_bed_nom:          70     # nominal validé
variable_temp_bed_min:          60
variable_temp_bed_max:          80

# --- VITESSES (mm/s) ---
variable_speed_outer_wall_nom:  40     # mur extérieur nominal
variable_speed_outer_wall_min:  20
variable_speed_outer_wall_max:  60
variable_speed_inner_wall_nom:  80
variable_speed_infill_nom:     100
variable_speed_travel_nom:     200

# --- FLOW ---
variable_flow_ratio_nom:      1.00     # PETG Clear Overture validé
variable_flow_ratio_min:      0.92
variable_flow_ratio_max:      1.08
variable_vol_flow_max:        11.0     # mm³/s — limite hotend standard 0.4

# --- RÉTRACTION ---
variable_retract_length_nom:   0.8     # direct drive
variable_retract_speed_nom:    35

# --- VENTILATION ---
variable_fan_min:               30     # % — PETG = refroidissement modéré
variable_fan_max:               60
variable_fan_first_layers:       0     # désactivé couches 1-3

# --- COMPORTEMENT ---
variable_avoid_crossing:         1
variable_wipe_dist:           0.75

gcode:
  RESPOND MSG="MAT_PETG_CLEAR chargé — temp_nozzle_nom={printer['gcode_macro MAT_PETG_CLEAR'].temp_nozzle_nom}"
