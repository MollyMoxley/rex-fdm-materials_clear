# ==============================================================
# GUARDS CHECK — TPU 85A
# repo   : rex-fdm-materials_clear
# path   : macros/TPU/guards_check_tpu85a.cfg
# version: 1.1.0
# fix    : Bug1 CANCEL_PRINT hors impression / Bug3 SPEED=0 /
#          Bug4 message OK toujours affiché / Bug5 TYPE=command->echo
# Appel  : GUARDS_CHECK_TPU85A TEMP=229 SPEED=35 FLOW=1.02 MACHINE=EX0
# Requis : fenetre_process_tpu85a.cfg chargé dans printer.cfg
# ==============================================================

[gcode_macro GUARDS_CHECK_TPU85A]
description: Assertions process TPU 85A — bloquant si hors fenêtre
variable_check_failed: 0
gcode:
  {% set temp    = params.TEMP    | default(0) | float %}
  {% set speed   = params.SPEED   | default(0) | float %}
  {% set flow    = params.FLOW    | default(0) | float %}
  {% set machine = params.MACHINE | default("UNKNOWN") | string %}

  # [Bug2] Vérifier que MAT_TPU85A est chargé
  {% if 'gcode_macro MAT_TPU85A' not in printer %}
    RESPOND TYPE=error MSG="⛔ MAT_TPU85A non chargé — ajouter [include] fenetre_process_tpu85a.cfg"
    {% if printer.print_stats.state == "printing" %}
      CANCEL_PRINT
    {% endif %}
  {% else %}

  {% set mat = printer['gcode_macro MAT_TPU85A'] %}
  {% set failed = [] %}

  RESPOND MSG="=== GUARDS CHECK TPU 85A — machine:{machine} ==="

  # ── TEMPÉRATURE ─────────────────────────────────────────
  {% if temp == 0 %}
    RESPOND TYPE=error MSG="⛔ TEMP non transmise — vérifier START_PRINT slicer"
    {% set _ = failed.append(1) %}
  {% elif temp > mat.temp_nozzle_max %}
    RESPOND TYPE=error MSG="⛔ TEMP {temp}C > max {mat.temp_nozzle_max}C"
    {% set _ = failed.append(1) %}
  {% elif temp < mat.temp_nozzle_min %}
    RESPOND TYPE=error MSG="⛔ TEMP {temp}C < min {mat.temp_nozzle_min}C"
    {% set _ = failed.append(1) %}
  {% elif temp < mat.temp_nozzle_nom - 5 %}
    RESPOND TYPE=echo MSG="⚠️  TEMP {temp}C sous nominal ({mat.temp_nozzle_nom}C)"
  {% else %}
    RESPOND MSG="✓ TEMP {temp}C — OK"
  {% endif %}

  # ── VITESSE ─────────────────────────────────────────────
  {% if speed == 0 %}
    RESPOND TYPE=echo MSG="⚠️  SPEED non transmis — vérifier START_PRINT slicer"
  {% elif speed > mat.speed_outer_wall_max %}
    RESPOND TYPE=error MSG="⛔ SPEED {speed}mm/s > max {mat.speed_outer_wall_max}mm/s"
    {% set _ = failed.append(1) %}
  {% elif speed > mat.speed_outer_wall_nom + 10 %}
    RESPOND TYPE=echo MSG="⚠️  SPEED {speed}mm/s dépasse nominal — risque stringing TPU"
  {% else %}
    RESPOND MSG="✓ SPEED {speed}mm/s — OK"
  {% endif %}

  # ── FLOW ────────────────────────────────────────────────
  {% if flow == 0 %}
    RESPOND TYPE=echo MSG="⚠️  FLOW non transmis — nominal {mat.flow_ratio_nom} appliqué"
  {% elif flow > mat.flow_ratio_max %}
    RESPOND TYPE=error MSG="⛔ FLOW {flow} > max {mat.flow_ratio_max}"
    {% set _ = failed.append(1) %}
  {% elif flow < mat.flow_ratio_min %}
    RESPOND TYPE=error MSG="⛔ FLOW {flow} < min {mat.flow_ratio_min}"
    {% set _ = failed.append(1) %}
  {% else %}
    RESPOND MSG="✓ FLOW {flow} — OK"
  {% endif %}

  # ── MACHINE ─────────────────────────────────────────────
  {% if machine not in ['EX0', 'EX1', 'EX3'] %}
    RESPOND TYPE=echo MSG="⚠️  Machine '{machine}' non référencée"
  {% else %}
    RESPOND MSG="✓ MACHINE {machine} — reconnue"
  {% endif %}

  # [Bug1+4] CANCEL uniquement si échec ET impression active
  {% if failed | length > 0 %}
    RESPOND TYPE=error MSG="⛔ GUARDS CHECK FAILED ({failed|length} erreur(s)) — ANNULATION"
    {% if printer.print_stats.state == "printing" %}
      CANCEL_PRINT
    {% else %}
      RESPOND TYPE=error MSG="⛔ Test hors impression — corriger avant lancement"
    {% endif %}
  {% else %}
    RESPOND MSG="=== GUARDS CHECK TPU 85A OK — lancement autorisé ==="
  {% endif %}

  {% endif %}
