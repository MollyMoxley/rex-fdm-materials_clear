; ============================================================
; MACRO PETG — EX0 Qidi X-Max 3
; Firmware    : Klipper (Qidi natif)
; Extrudeur   : Direct Drive natif Qidi
; Sonde ABL   : Inductif LJ12A3-4-Z/BX
; Plateau     : 310 x 310 x 315 mm
; Matière     : PETG Clear Overture
; Source      : materials/PETG-CLEAR-OVERTURE.mat
; Version     : 1.0 — 2026-03-20
; Statut      : ESSAI — à valider
; ============================================================

; --- VARIABLES ORCA (remplacées à la génération du GCODE) ---
; {first_layer_temperature}    → temp nozzle première couche
; {temperature}                → temp nozzle autres couches
; {first_layer_bed_temperature}→ temp bed première couche
; {bed_temperature}            → temp bed autres couches

; ============================================================
; START GCODE
; ============================================================
[start_gcode]
M104 S{first_layer_temperature}     ; preheat nozzle sans attendre
M140 S{first_layer_bed_temperature} ; preheat bed sans attendre
G28                                  ; home all axes
G29                                  ; ABL mesh (LJ12A3 inductif)
M109 S{first_layer_temperature}     ; wait nozzle temp
M190 S{first_layer_bed_temperature} ; wait bed temp
G92 E0
G1 Z5 F3000                          ; lift nozzle
G1 X5 Y5 F6000                       ; move to start corner

; --- purge line gauche ---
G1 Z0.3 F3000
G92 E0
G1 Y280 E18 F800                     ; purge ligne 280mm
G1 X6.5 F3000
G1 Y5 E36 F800                       ; retour purge
G92 E0
G1 Z2 F3000                          ; lift avant impression

; ============================================================
; END GCODE
; ============================================================
[end_gcode]
M104 S0                              ; nozzle off
M140 S0                              ; bed off
M106 S0                              ; fan off
G92 E0
G1 E-2 F800                          ; retract 2mm
G91                                  ; coordonnées relatives
G1 Z10 F3000                         ; lift Z +10mm
G90                                  ; coordonnées absolues
G1 X5 Y290 F6000                     ; move to front-left
M84                                  ; motors off

; ============================================================
; NOTES D ADAPTATION EX0
; ============================================================
; - Rétraction 1.0mm (DD court Qidi) vs 0.8mm A1 — à ajuster si stringing
; - Volumetric speed réduit à 10mm³/s (vs 12 A1) — conservatif premier test
; - G29 ABL natif Klipper avec mesh LJ12A3
; - Plateau 310x310 — purge ligne côté Y gauche (X=5, Y=5→280)
; - Pas de M420 S1 (pas de mesh sauvegardé par défaut sur Qidi Klipper)
; ============================================================
